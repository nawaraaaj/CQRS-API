<h2>Update Student Details</h2>

<form (ngSubmit)="onSubmit()">
  <label for="id">Student ID:</label>
  <input id="id" type="number" [formControl]="id" /><br /><br />

  <label for="name">Name</label>
  <input id="name" type="text" [formControl] ="name" /><br /><br />

  <label for="age">Age</label>
  <input id="age" type="number" [formControl]="name"/><br /><br />

  <label for="address">Address</label>
  <input id="address" type="text" [formControl] ="address" /><br /><br />

  <button type="submit">Update</button>
</form>
